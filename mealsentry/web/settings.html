<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="/favicon.ico" />
<title>MealSentry — Control</title>
<style>
  :root {
    --bg0:#0e0d12; --bg1:#16141d; --panel:#1c1a24; --panel2:#232030; --ink:#e9e4d6;
    --muted:#9b93a8; --line:#33304a; --accent:#e3b23c; --accent2:#ffd873; --ok:#4c9f70;
    --bad:#d1495b; --slot:#14121b;
  }
  * { box-sizing:border-box; }
  body { margin:0; padding:16px; color:var(--ink); font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
         background:linear-gradient(180deg,var(--bg1),var(--bg0)); min-height:100vh; }
  .wrap { max-width:760px; margin:0 auto; }
  h1 { font-size:22px; letter-spacing:2px; text-transform:uppercase; margin:0 0 2px;
       background:linear-gradient(180deg,#fff2c2,var(--accent)); -webkit-background-clip:text;
       background-clip:text; color:transparent; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:16px; }
  .sub a { color:var(--accent2); }
  .panel { background:linear-gradient(180deg,var(--panel),var(--panel2)); border:2px solid var(--line);
           border-radius:12px; padding:14px; margin-bottom:16px; }
  .panel h2 { font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--accent2);
              margin:0 0 12px; border-bottom:1px solid var(--line); padding-bottom:8px; }
  label { display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
  input, select { width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
                  background:var(--slot); color:var(--ink); font-size:15px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  button { cursor:pointer; border:none; border-radius:8px; padding:10px 14px; font-weight:700;
           font-size:14px; background:linear-gradient(180deg,var(--accent2),var(--accent)); color:#221c0a; }
  button.ghost { background:var(--slot); color:var(--ink); border:1px solid var(--line); }
  button.danger { background:var(--bad); color:#fff; padding:6px 10px; font-size:12px; }
  .row { display:flex; align-items:center; gap:8px; padding:8px 4px; border-bottom:1px dashed var(--line);
         flex-wrap:wrap; }
  .row:last-child { border-bottom:0; }
  .row .nm { flex:1; min-width:120px; font-size:14px; }
  .row .cat { color:var(--muted); font-size:11px; }
  .row input.g { width:74px; text-align:right; }
  .toolbar { display:flex; gap:8px; margin-bottom:10px; }
  .toolbar input { flex:1; }
  .toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:var(--ok);
           color:#04120a; padding:10px 16px; border-radius:20px; font-weight:700; opacity:0;
           transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.err { background:var(--bad); color:#fff; }
  details summary { cursor:pointer; color:var(--accent2); font-weight:700; margin-bottom:8px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>MealSentry · Control</h1>
    <div class="sub">Ρυθμίσεις προγράμματος · <a href="/">← Dashboard</a></div>

    <section class="panel">
      <h2>👤 Προφίλ & Στόχοι</h2>
      <div class="grid2">
        <div><label>Όνομα</label><input id="p_name"></div>
        <div><label>Ηλικία</label><input id="p_age" type="number"></div>
        <div><label>Ύψος (cm)</label><input id="p_height_cm" type="number"></div>
        <div><label>Βάρος (kg)</label><input id="p_weight_kg" type="number" step="0.1"></div>
        <div><label>Στόχος βημάτων</label><input id="p_steps_target" type="number"></div>
        <div><label>Gym/εβδ.</label><input id="p_gym_target_sessions" type="number"></div>
        <div><label>Ύπνος (h)</label><input id="p_sleep_target_hours" type="number" step="0.5"></div>
        <div><label>Protein factor</label><input id="p_protein_factor" type="number" step="0.1"></div>
        <div><label>Deficit (kcal)</label><input id="p_deficit_kcal" type="number"></div>
      </div>
      <div style="margin-top:12px"><button onclick="saveProfile()">💾 Αποθήκευση προφίλ</button></div>
    </section>

    <section class="panel">
      <h2>🍽️ Τρόφιμα (ανά 100g · default γραμμάρια)</h2>
      <div class="toolbar">
        <input id="search" placeholder="🔎 φίλτρο..." oninput="render()">
      </div>
      <div id="foods"></div>
      <details style="margin-top:12px">
        <summary>➕ Νέο τρόφιμο</summary>
        <div class="grid2">
          <div><label>id (λατινικά)</label><input id="f_id"></div>
          <div><label>Όνομα</label><input id="f_name"></div>
          <div><label>Κατηγορία</label>
            <select id="f_category">
              <option value="protein">protein</option><option value="carb">carb</option>
              <option value="dairy">dairy</option><option value="veg">veg</option>
              <option value="fruit">fruit</option><option value="fat">fat</option>
              <option value="legume">legume</option><option value="sauce">sauce</option>
              <option value="supplement">supplement</option><option value="snack">snack</option>
              <option value="sweetener">sweetener</option><option value="treat">treat</option>
              <option value="other">other</option>
            </select></div>
          <div><label>default γραμμάρια</label><input id="f_default_g" type="number" value="100"></div>
        </div>
        <div class="grid2">
          <div><label>kcal /100g</label><input id="f_kcal" type="number"></div>
          <div><label>protein /100g</label><input id="f_protein" type="number"></div>
          <div><label>carbs /100g</label><input id="f_carbs" type="number" value="0"></div>
          <div><label>fat /100g</label><input id="f_fat" type="number" value="0"></div>
        </div>
        <label>aliases (χωρισμένα με κόμμα)</label><input id="f_aliases" placeholder="π.χ. γυρος, gyros">
        <div style="margin-top:10px"><button onclick="addFood()">➕ Πρόσθεσε</button></div>
      </details>
    </section>

    <section class="panel">
      <h2>🪙 Ανταμοιβές (κόστος σε coins)</h2>
      <div id="rewards"></div>
      <details style="margin-top:12px">
        <summary>➕ Νέα ανταμοιβή</summary>
        <div class="grid2">
          <div><label>id (λατινικά)</label><input id="r_id"></div>
          <div><label>Όνομα</label><input id="r_name"></div>
          <div><label>Emoji</label><input id="r_emoji" value="🎁"></div>
          <div><label>Κόστος (coins)</label><input id="r_cost" type="number" value="30"></div>
        </div>
        <div style="margin-top:10px"><button onclick="addReward()">➕ Πρόσθεσε</button></div>
      </details>
    </section>
  </div>
  <div class="toast" id="toast"></div>

<script>
const TOKEN = (location.pathname.split("/d/")[1] || "").replace(/\/$/, "");
const q = (id) => document.getElementById(id);
let FOODS = [];

function toast(msg, err) {
  const t = q("toast"); t.textContent = msg; t.className = "toast show" + (err ? " err" : "");
  setTimeout(() => t.className = "toast", 1800);
}
async function api(method, path, body) {
  const sep = path.includes("?") ? "&" : "?";
  const r = await fetch(path + sep + "t=" + encodeURIComponent(TOKEN),
    { method, headers: {"Content-Type":"application/json"}, body: body ? JSON.stringify(body) : undefined });
  if (!r.ok) { toast((await r.json().catch(()=>({}))).detail || ("Σφάλμα " + r.status), true); throw new Error(r.status); }
  return r.json();
}

async function loadProfile() {
  const p = await (await fetch("/api/profile")).json();
  for (const k of ["name","age","height_cm","weight_kg","steps_target","gym_target_sessions",
                   "sleep_target_hours","protein_factor","deficit_kcal"])
    if (p[k] != null) q("p_" + k).value = p[k];
}
async function saveProfile() {
  const body = {};
  for (const k of ["name","age","height_cm","weight_kg","steps_target","gym_target_sessions",
                   "sleep_target_hours","protein_factor","deficit_kcal"]) {
    const v = q("p_" + k).value.trim();
    if (v !== "") body[k] = (k === "name") ? v : Number(v);
  }
  await api("POST", "/api/profile", body); toast("✅ Αποθηκεύτηκε");
}

async function loadFoods() { FOODS = await (await fetch("/api/foods")).json(); render(); }
function render() {
  const f = q("search").value.trim().toLowerCase();
  const list = FOODS.filter(x => !f || x.name.toLowerCase().includes(f) || x.id.includes(f) || x.category.includes(f));
  q("foods").innerHTML = list.map(x => `
    <div class="row">
      <span class="nm">${x.name} <span class="cat">· ${x.category} · ${Math.round(x.kcal)}kcal/${x.protein}p</span></span>
      <input class="g" type="number" value="${Math.round(x.default_g)}" id="g_${x.id}">
      <button class="ghost" onclick="saveG('${x.id}')">💾 g</button>
      <button class="danger" onclick="delFood('${x.id}','${x.name.replace(/'/g,"")}')">🗑</button>
    </div>`).join("") || '<div class="cat">Κανένα.</div>';
}
async function saveG(id) {
  await api("POST", "/api/foods/" + id + "/default_g", { grams: Number(q("g_" + id).value) });
  toast("✅ default γραμμάρια"); await loadFoods();
}
async function delFood(id, name) {
  if (!confirm("Διαγραφή «" + name + "»;")) return;
  await api("DELETE", "/api/foods/" + id); toast("🗑 Διαγράφηκε"); await loadFoods();
}
async function addFood() {
  const body = {
    id: q("f_id").value.trim(), name: q("f_name").value.trim(), category: q("f_category").value,
    kcal: Number(q("f_kcal").value), protein: Number(q("f_protein").value),
    carbs: Number(q("f_carbs").value) || 0, fat: Number(q("f_fat").value) || 0,
    default_g: Number(q("f_default_g").value) || 100,
    aliases: q("f_aliases").value.split(",").map(s => s.trim()).filter(Boolean),
  };
  if (!body.id || !body.name) { toast("id & όνομα υποχρεωτικά", true); return; }
  await api("POST", "/api/foods", body); toast("✅ Προστέθηκε");
  q("f_id").value = q("f_name").value = q("f_kcal").value = q("f_protein").value = "";
  await loadFoods();
}

async function loadRewards() {
  const rs = await (await fetch("/api/rewards")).json();
  q("rewards").innerHTML = rs.map(r => `
    <div class="row">
      <span class="nm">${r.emoji} ${r.name} <span class="cat">· ${r.kind}</span></span>
      <input class="g" type="number" value="${r.cost}" id="rc_${r.id}">
      <button class="ghost" onclick="saveRCost('${r.id}')">💾</button>
      <button class="danger" onclick="delReward('${r.id}','${r.name.replace(/'/g,"")}')">🗑</button>
    </div>`).join("");
}
async function saveRCost(id) {
  await api("POST", "/api/rewards/" + id + "/cost", { cost: Number(q("rc_" + id).value) });
  toast("✅ κόστος"); await loadRewards();
}
async function delReward(id, name) {
  if (!confirm("Διαγραφή «" + name + "»;")) return;
  await api("DELETE", "/api/rewards/" + id); toast("🗑 Διαγράφηκε"); await loadRewards();
}
async function addReward() {
  const b = { id: q("r_id").value.trim(), name: q("r_name").value.trim(),
              emoji: q("r_emoji").value || "🎁", cost: Number(q("r_cost").value) || 30, kind: "leisure" };
  if (!b.id || !b.name) { toast("id & όνομα υποχρεωτικά", true); return; }
  await api("POST", "/api/rewards", b); toast("✅ Προστέθηκε");
  q("r_id").value = q("r_name").value = ""; await loadRewards();
}

loadProfile(); loadFoods(); loadRewards();
</script>
</body>
</html>
