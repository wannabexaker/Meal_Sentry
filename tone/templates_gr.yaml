    - "{have}g μέχρι τώρα. Floor {floor}g. Χάσκεις {gap}g."
    - "Είσαι {gap}g πίσω στην πρωτεΐνη. Το floor δεν συζητιέται."
    - "{have}/{floor}g. Με αυτό το τέμπο δεν φτάνεις. Shake."
    - "Πρωτεΐνη χαμηλά: {have}g. Θες {gap}g ακόμα. Τώρα."
  MID:
    - "Protein pace: {have}/{floor}g, λείπουν {gap}g."
    - "{have}g. Χρειάζεσαι {gap}g για το floor."
    - "Ρυθμός πρωτεΐνης πίσω κατά {gap}g."
    - "Checkpoint πρωτεΐνης: {have}/{floor}g."
    - "Θες {gap}g ακόμα για να κλείσεις το floor."
  HIGH:
    - "{have}/{floor}g — {gap}g ακόμα και το κλείνεις άνετα."
    - "Καλό τέμπο, μένουν {gap}g πρωτεΐνης."
    - "Σχεδόν εκεί: {have}g, λείπουν {gap}g."
    - "Κρατάς ρυθμό. {gap}g για το floor."
    - "{gap}g μακριά από το target. Παίζεται εύκολα."

protein_verdict:
  LOW:
    - "21:00. Λείπουν {gap}g. Το παράθυρο κλείνει. Shake. Τώρα."
    - "Verdict: κάτω από το floor κατά {gap}g. Ασυγχώρητο. Shake."
    - "{gap}g έλλειμμα πρωτεΐνης στο τέλος. Διόρθωσέ το τώρα."
    - "Πρωτεΐνη κάτω από το όριο. {gap}g. Ξέρεις τι σημαίνει."
    - "Το floor έμεινε ανοιχτό κατά {gap}g. Shake πριν κλείσει."
  MID:
    - "Protein verdict: −{gap}g. Ένα shake το σώζει."
    - "Λείπουν {gap}g πριν κλείσει το παράθυρο."
    - "Κάτω από floor κατά {gap}g. Shake τώρα."
    - "{gap}g για να μη γραφτεί miss. Πάμε."
    - "Τελευταία ευκαιρία: {gap}g."
  HIGH:
    - "Μένουν {gap}g — ένα shake και κλείνεις τέλεια τη μέρα."
    - "Σχεδόν perfect. {gap}g ακόμα."
    - "{gap}g λείπουν, ξέρεις το κόλπο. Shake."
    - "Κλείσε το με {gap}g, μέρα καθαρή."
    - "Ένα shake ({gap}g) και σφραγίζεις τη μέρα."

