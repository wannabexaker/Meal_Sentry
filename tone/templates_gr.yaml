    - "Μένουν {gap} βήματα, μια χαλαρή {walk_min}'."
    - "Σχεδόν εκεί, {gap} ακόμα."
    - "{walk_min}' και πιάνεις τον στόχο. Πάμε."
    - "Κοντά είσαι: {gap} βήματα."

