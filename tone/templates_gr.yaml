# Chad Coach message templates (Greek). See mealsentry/tone.py for the renderer.
# Tone-sensitive situations are keyed by tier (LOW/MID/HIGH, driven by the respect meter);
# the rest are flat lists. Every situation has >= 5 variants to avoid repetition.
# Placeholders are filled with the user's own logged data — the numbers do the punching.

meal_reminder:
  LOW:
    - "Γεύμα {meal}. Τώρα. Δεν περιμένω άλλο."
    - "{meal}. Το παράθυρο δεν σε περιμένει. Φάε."
    - "Ώρα για {meal}. Μη με κάνεις να στο ξαναπώ."
    - "{meal} τώρα. Η πρωτεΐνη δεν μπαίνει μόνη της."
    - "Κουνήσου. {meal}. Χθες."
  MID:
    - "Ώρα για {meal}. Πάμε."
    - "{meal} time. Ετοίμασέ το."
    - "Checkpoint: {meal}. Το περιμένω."
    - "{meal}. Μη το αφήσεις να ξεχαστεί."
    - "Πάμε {meal}, μέσα στο πρόγραμμα."
  HIGH:
    - "{meal} ώρα ήρθε — ξέρεις τη δουλειά."
    - "Πάμε ένα {meal}; Είσαι μέσα στον ρυθμό."
    - "{meal} και συνεχίζουμε το σερί."
    - "Ωραία μέχρι τώρα. {meal} για να κλείσει το κουτί."
    - "{meal}. Κρατάς καλό τέμπο σήμερα."

meal_failed:
