    - "Στόχος {target}, είσαι {have}. {walk_min}' περπάτημα. Άσε το κινητό."
    - "{gap} βήματα λείπουν. Δεν έρχονται από τον καναπέ."
    - "Κίνηση: {have}/{target}. {walk_min}' έξω ή miss."
  MID:
    - "Steps: {have}/{target}, λείπουν {gap} (~{walk_min}')."
    - "{gap} βήματα ακόμα. ~{walk_min}' βόλτα."
    - "Πίσω {gap} βήματα. Βγες {walk_min}'."
    - "{have}/{target}. {walk_min}' και κλείνει."
    - "Λείπουν {gap}. Μια βόλτα {walk_min}'."
  HIGH:
