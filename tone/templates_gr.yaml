    - "FAILED. Ειδοποιήσεις: {warn_times}. Κανένα δεν το κοίταξες."
    - "{meal}: μηδέν. Χτύπησα {warn_times}. Σιωπή."
    - "Το παράθυρο έκλεισε. {warn_times} σε φώναξα. Τίποτα."
    - "Αποτυχία καταγράφηκε. Οι ώρες: {warn_times}. Δικές σου."
  MID:
    - "Χαμένο γεύμα. Ειδοποιήσεις: {warn_times}."
    - "Δεν μπήκε. Σε είχα ειδοποιήσει {warn_times}."
    - "{meal} failed. Receipts: {warn_times}."
    - "Το γράφω ως miss. {warn_times} οι προειδοποιήσεις."
    - "Έληξε. Warnings στις {warn_times}."
  HIGH:
    - "Το φάγαμε αυτό; Όχι. Σε είχα ειδοποιήσει {warn_times}. Αύριο καλύτερα."
    - "Miss. Δεν είναι το τέλος — αλλά ειδοποίησα {warn_times}."
    - "Ξέφυγε το {meal}. {warn_times} τα pings. Το ξέρεις."
    - "OK, χάθηκε ένα. {warn_times}. Το επόμενο δεν το χάνουμε."
    - "Ένα miss δεν σε ορίζει, αλλά {warn_times} σε φώναξα."

protein_pace:
